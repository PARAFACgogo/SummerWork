<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>主页</title>
  <style>
    :root {
      color-scheme: light dark;
      --ink: #20242a;
      --muted: #68727f;
      --line: #d8dde4;
      --paper: #ffffff;
      --wash: #f6f4ef;
      --accent: #7b2b2b;
      --accent-dark: #5f2020;
      --chip: #f3e8e3;
      --shadow: 0 18px 48px rgba(32, 36, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
      color: var(--ink);
      background: linear-gradient(180deg, rgba(123, 43, 43, 0.08), rgba(246, 244, 239, 0) 360px), var(--wash);
      line-height: 1.6;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .shell {
      min-height: calc(100vh - 80px);
      display: grid;
      align-content: start;
      gap: 28px;
    }

    header {
      padding: 30px 0 8px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent-dark);
      font-family: Arial, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--accent-dark);
      font-size: clamp(2rem, 6vw, 3.6rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro {
      max-width: 620px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .entry-grid {
      display: grid;
      grid-template-columns: minmax(0, 420px);
      gap: 18px;
    }

    .entry {
      display: grid;
      gap: 18px;
      min-height: 210px;
      padding: 24px;
      border: 1px solid rgba(123, 43, 43, 0.18);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(253, 251, 247, 0.92)), var(--paper);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .entry:hover,
    .entry:focus-visible {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 22px 58px rgba(32, 36, 42, 0.12);
      outline: none;
    }

    .entry-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--accent-dark);
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    h2 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 1.45rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .entry p {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .action {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent-dark);
      font-family: Arial, sans-serif;
      font-size: 0.94rem;
      font-weight: 700;
    }

    .arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--chip);
    }

    .arrow svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .placeholder {
      min-height: 220px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.45);
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 22px, 960px);
        padding: 24px 0;
      }

      .shell { min-height: calc(100vh - 48px); }
      header { padding-top: 18px; }
      .entry-grid { grid-template-columns: 1fr; }
      .entry { padding: 20px; }
      .entry-top { flex-direction: column; }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f1f3f5;
        --muted: #9da8b3;
        --line: #343b45;
        --paper: #151922;
        --wash: #0f1218;
        --accent: #d88a8a;
        --accent-dark: #f0b4b4;
        --chip: #2b2224;
        --shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      }

      body {
        background: linear-gradient(180deg, rgba(216, 138, 138, 0.12), rgba(15, 18, 24, 0) 360px), var(--wash);
      }

      .entry {
        background: linear-gradient(135deg, rgba(23, 27, 36, 0.96), rgba(18, 22, 30, 0.92)), var(--paper);
      }

      .entry:hover,
      .entry:focus-visible {
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.42);
      }

      .placeholder {
        background: rgba(255, 255, 255, 0.035);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <header>
        <p class="eyebrow">Site Home</p>
        <h1>主页</h1>
        <p class="intro">当前仅开放 SummerWork 入口，其余区域暂时保留给后续开发。</p>
      </header>

      <section class="entry-grid" aria-label="站点入口">
        <a class="entry" href="SummerWork/index.html" aria-label="进入 SummerWork 书籍下载页面">
          <div class="entry-top">
            <div>
              <h2>SummerWork</h2>
              <p>进入书籍下载页面，获取 PDF、EPUB、DOCX 等格式。</p>
            </div>
            <span class="badge">4 本书</span>
          </div>
          <span class="action">
            <span class="arrow" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg></span>
            打开入口
          </span>
        </a>
      </section>

      <section class="placeholder" aria-hidden="true"></section>
    </div>
  </main>
</body>
</html>
